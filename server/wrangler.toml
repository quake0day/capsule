name = "capsule-registry"
compatibility_date = "2026-01-01"
pages_build_output_dir = "."

# L3: KV-backed mutable registry overlay. Reads merge KV entries on top of
# the static registry.json; pushes write new entries to KV. The static file
# remains the seed / fallback so the registry still works if KV is empty.
[[kv_namespaces]]
binding = "CAPSULE_REGISTRY"
id = "69fcfc982edd4652b9635a8ca989e38a"
